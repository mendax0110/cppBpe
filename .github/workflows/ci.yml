name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential \
            cmake \
            pkg-config \
            libpcre2-dev \
            libtbb-dev \
            python3-dev \
            python3-pip

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install "pybind11[global]" pytest tiktoken regex rustbpe

      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCPPBPE_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run C++ tests
        run: build/cppBpe_tests

      - name: Run Python tests
        run: PYTHONPATH=build pytest tests/python/test_tokenizer.py -v

      - name: Run benchmark
        run: |
          cd build
          PYTHONPATH=. python3 ../tests/python/benchmark.py \
            --vocab 8192 \
            --n 100 \
            --probe 100000 \
            --corpus ../input.txt